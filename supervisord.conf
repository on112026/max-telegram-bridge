; supervisord-конфиг для max-telegram-bridge.
; Запускает три процесса в одном контейнере: api, bot, watcher.
; Логи шлются в /dev/stdout — это критично для managed-хостингов
; (Railway / Render), которые показывают только stdout контейнера.

[supervisord]
nodaemon=true
logfile=/dev/stdout
logfile_maxbytes=0
pidfile=/var/run/supervisord.pid

[unix_http_server]
file=/var/run/supervisor.sock
chmod=0700

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[program:api]
command=uvicorn main:app --host 0.0.0.0 --port 8000 --proxy-headers
directory=/app/api
autostart=true
autorestart=true
priority=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:bot]
command=python run.py
directory=/app/bot
autostart=true
autorestart=true
priority=20
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:watcher]
command=python run.py
directory=/app/watcher
autostart=true
autorestart=true
priority=30
environment=CHROMIUM_PATH="/usr/bin/chromium"
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0